<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programme Choice</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; }
        input[type=range] { width: 100%; }
        .result-box { text-align: center; font-size: 1.2em; font-weight: bold; color: #2c3e50; margin: 20px 0; padding: 15px; background: #e8f4f8; border-radius: 8px; }
        canvas { max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Sistem Pilihan Program</h1>
    <p style="text-align: center;">Ubah pemberat (weights) di bawah untuk melihat simulasi Multinomial Logit.</p>

    <div class="controls">
        <div class="control-group">
            <label>Interest Weight: <span id="val_interest">0.30</span></label>
            <input type="range" id="w_interest" min="0" max="1" step="0.05" value="0.30" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>Exam Results Weight: <span id="val_exam">0.20</span></label>
            <input type="range" id="w_exam" min="0" max="1" step="0.05" value="0.20" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>Career Prospects Weight: <span id="val_career">0.25</span></label>
            <input type="range" id="w_career" min="0" max="1" step="0.05" value="0.25" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>Location Weight: <span id="val_location">0.10</span></label>
            <input type="range" id="w_location" min="0" max="1" step="0.05" value="0.10" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>Fees Weight: <span id="val_fees">0.10</span></label>
            <input type="range" id="w_fees" min="0" max="1" step="0.05" value="0.10" oninput="updateModel()">
        </div>
        <div class="control-group">
            <label>Explore Weight: <span id="val_explore">0.05</span></label>
            <input type="range" id="w_explore" min="0" max="1" step="0.05" value="0.05" oninput="updateModel()">
        </div>
    </div>

    <div class="result-box" id="top_choice">
        Pilihan Utama: Memuatkan...
    </div>

    <h2>Kebarangkalian Pilihan (%)</h2>
    <canvas id="myChart"></canvas>
</div>

<script>
    // 1. Preload Data
    const data = [
        { name: "Pure Sciences", interest: 5, exam: 5, career: 3, location: 3, fees: 4, explore: 2 },
        { name: "Applied Sciences", interest: 4, exam: 5, career: 4, location: 3, fees: 3, explore: 3 },
        { name: "Engineering", interest: 4, exam: 5, career: 5, location: 2, fees: 5, explore: 2 },
        { name: "Accounting", interest: 3, exam: 4, career: 4, location: 4, fees: 4, explore: 2 },
        { name: "Management", interest: 3, exam: 3, career: 3, location: 5, fees: 3, explore: 3 },
        { name: "Arts", interest: 2, exam: 3, career: 2, location: 4, fees: 2, explore: 4 }
    ];

    let chartInstance = null;

    function updateModel() {
        const w = {
            interest: parseFloat(document.getElementById('w_interest').value),
            exam: parseFloat(document.getElementById('w_exam').value),
            career: parseFloat(document.getElementById('w_career').value),
            location: parseFloat(document.getElementById('w_location').value),
            fees: parseFloat(document.getElementById('w_fees').value),
            explore: parseFloat(document.getElementById('w_explore').value),
        };

        document.getElementById('val_interest').innerText = w.interest.toFixed(2);
        document.getElementById('val_exam').innerText = w.exam.toFixed(2);
        document.getElementById('val_career').innerText = w.career.toFixed(2);
        document.getElementById('val_location').innerText = w.location.toFixed(2);
        document.getElementById('val_fees').innerText = w.fees.toFixed(2);
        document.getElementById('val_explore').innerText = w.explore.toFixed(2);

        // 2. Pengiraan Multinomial Logit
        let sumExpV = 0;
        
        // Pengiraan V dan e^V untuk setiap program
        data.forEach(item => {
            item.utility = (item.interest * w.interest) + (item.exam * w.exam) + (item.career * w.career) + 
                           (item.location * w.location) + (item.fees * w.fees) + (item.explore * w.explore);
            item.expV = Math.exp(item.utility);
            sumExpV += item.expV;
        });

        // Pengiraan peratusan kebarangkalian
        let highestProb = 0;
        let topProgramme = "";

        data.forEach(item => {
            item.probability = (item.expV / sumExpV) * 100;
            if(item.probability > highestProb) {
                highestProb = item.probability;
                topProgramme = item.name;
            }
        });

        document.getElementById('top_choice').innerHTML = `🏆 Pilihan Paling Tinggi: <strong>${topProgramme}</strong> (${highestProb.toFixed(2)}%)`;

        drawChart();
    }

    function drawChart() {
        const labels = data.map(item => item.name);
        const probabilities = data.map(item => item.probability.toFixed(2));

        const ctx = document.getElementById('myChart').getContext('2d');
        
        if (chartInstance) {
            chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Probability (%)',
                    data: probabilities,
                    backgroundColor: '#3498db',
                    borderRadius: 5
                }]
            },
            options: {
                scales: { y: { beginAtZero: true, max: 100 } },
                plugins: { legend: { display: false } }
            }
        });
    }
    window.onload = updateModel;
</script>

</body>
</html>
